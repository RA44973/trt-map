<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <title>Карта ТРТ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
  <style>
    html, body { height:100%; margin:0; font-family:Arial,sans-serif; }
    .app { display:flex; height:100%; }
    .sidebar {
      width:360px; min-width:360px; background:#f7f8fa;
      border-right:1px solid #e2e5ea; padding:18px 16px;
      box-sizing:border-box; overflow-y:auto;
    }
    .sidebar h2 { margin:0 0 14px; font-size:20px; }
    .card {
      background:#fff; border-radius:12px; padding:14px;
      box-shadow:0 1px 3px rgba(0,0,0,.08); margin-bottom:14px;
    }
    .filter-label {
      display:block; color:#667085; font-size:12px; text-transform:uppercase;
      letter-spacing:.04em; margin-bottom:6px;
    }
    select {
      width:100%; height:40px; border:1px solid #d0d5dd; border-radius:8px;
      background:#fff; padding:0 10px; font-size:14px;
    }
    .counter { margin-top:8px; color:#667085; font-size:13px; }
    .name { margin:0 0 10px; font-size:18px; }
    .size-badge {
      display:inline-flex; align-items:center; justify-content:center;
      min-width:44px; height:28px; padding:0 10px; border-radius:14px;
      color:#fff; font-weight:bold; font-size:14px;
    }
    .field { margin:10px 0; font-size:14px; line-height:1.4; }
    .label {
      color:#667085; font-size:12px; text-transform:uppercase;
      letter-spacing:.04em; margin-bottom:2px;
    }
    .hint { color:#667085; font-size:13px; line-height:1.45; }
    #map { flex:1; height:100%; }
    .size-marker {
      width:18px; height:18px; border-radius:50%; border:2px solid white;
      box-shadow:0 1px 3px rgba(0,0,0,.35);
    }
    @media (max-width:720px) {
      .app { flex-direction:column; }
      .sidebar {
        width:100%; min-width:0; height:42%; border-right:0;
        border-bottom:1px solid #e2e5ea;
      }
      #map { height:58%; }
    }
  </style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <h2>Карта ТРТ</h2>

    <div class="card">
      <label class="filter-label" for="direction-filter">Направление</label>
      <select id="direction-filter">
        <option value="Все направления">Все направления</option>
        <option value="Обои">Обои</option>
        <option value="Плитка">Плитка</option>
      </select>

      <label class="filter-label" for="manager-filter" style="margin-top:12px;">Менеджер</label>
      <select id="manager-filter">
        <option value="Все менеджеры">Все менеджеры</option>
      </select>

      <div class="counter" id="visible-count"></div>
    </div>

    <div class="card">
      <div id="trt-empty" class="hint">
        Нажмите на конкретную точку на карте, чтобы открыть карточку ТРТ.
      </div>
      <div id="trt-card" style="display:none;">
        <h3 id="trt-name" class="name"></h3>
        <div class="field"><div class="label">Направление</div><div id="trt-direction"></div></div>
        <div class="field"><div class="label">Размер</div><div id="trt-size"></div></div>
        <div class="field"><div class="label">Менеджер</div><div id="trt-manager"></div></div>
        <div class="field"><div class="label">Регион</div><div id="trt-region"></div></div>
        <div class="field"><div class="label">Адрес</div><div id="trt-address"></div></div>
      </div>
    </div>
  </aside>
  <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

function colorForSize(size) {
  if (size === null || size === undefined || Number.isNaN(Number(size))) return '#7f8c8d';
  const value = Number(size);
  if (value < 50) return '#e74c3c';
  if (value <= 100) return '#f1c40f';
  return '#2ecc71';
}

function formatSize(size) {
  if (size === null || size === undefined || Number.isNaN(Number(size))) return '—';
  return Number(size).toLocaleString('ru-RU', {maximumFractionDigits: 1});
}

function updateSidebar(p) {
  document.getElementById('trt-empty').style.display = 'none';
  document.getElementById('trt-card').style.display = 'block';
  document.getElementById('trt-name').textContent = p.client || 'ТРТ';
  document.getElementById('trt-direction').textContent = p.direction || '—';
  document.getElementById('trt-size').innerHTML =
    '<span class="size-badge" style="background:' + colorForSize(p.size) + '">' +
    formatSize(p.size) + '</span>';
  document.getElementById('trt-manager').textContent = p.manager || '—';
  document.getElementById('trt-region').textContent = p.region || '—';
  document.getElementById('trt-address').textContent = p.address || '—';
}

const map = L.map('map').setView([56.0, 40.0], 6);
L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom:18,
  attribution:'© OpenStreetMap contributors'
}).addTo(map);
map.attributionControl.setPrefix('');

const clusters = L.markerClusterGroup({
  zoomToBoundsOnClick:true,
  spiderfyOnMaxZoom:true,
  iconCreateFunction:function(cluster) {
    const markers = cluster.getAllChildMarkers();
    const validSizes = markers
      .map(m => Number(m.options.sizeValue))
      .filter(v => Number.isFinite(v));
    const avg = validSizes.length
      ? validSizes.reduce((sum, value) => sum + value, 0) / validSizes.length
      : null;
    const color = colorForSize(avg);
    return L.divIcon({
      html:'<div style="background:'+color+';width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:3px solid white;box-shadow:0 1px 3px rgba(0,0,0,.35)"><span style="color:white;font-weight:bold">'+markers.length+'</span></div>',
      className:'',
      iconSize:[40,40]
    });
  }
});

const markerRecords = points.map(function(p) {
  const icon = L.divIcon({
    className:'',
    html:'<div class="size-marker" style="background:'+colorForSize(p.size)+'"></div>',
    iconSize:[18,18],
    iconAnchor:[9,9]
  });
  const marker = L.marker([p.lat,p.lon], {
    icon:icon,
    sizeValue:p.size,
    title:p.client
  });
  marker.on('click', function() { updateSidebar(p); });
  marker.bindTooltip(p.client || 'ТРТ');
  return {point:p, marker:marker};
});

map.addLayer(clusters);

function populateManagerFilter() {
  const select = document.getElementById('manager-filter');
  const managers = Array.from(
    new Set(
      points
        .map(p => (p.manager || '').trim())
        .filter(Boolean)
    )
  ).sort((a, b) => a.localeCompare(b, 'ru'));

  managers.forEach(function(manager) {
    const option = document.createElement('option');
    option.value = manager;
    option.textContent = manager;
    select.appendChild(option);
  });
}

function applyFilter() {
  const selectedDirection = document.getElementById('direction-filter').value;
  const selectedManager = document.getElementById('manager-filter').value;

  clusters.clearLayers();

  const visible = markerRecords.filter(function(item) {
    const directionOk =
      selectedDirection === 'Все направления' ||
      item.point.direction === selectedDirection;

    const managerOk =
      selectedManager === 'Все менеджеры' ||
      item.point.manager === selectedManager;

    return directionOk && managerOk;
  });

  visible.forEach(function(item) {
    clusters.addLayer(item.marker);
  });

  document.getElementById('visible-count').textContent =
    'Показано ТРТ: ' + visible.length;

  document.getElementById('trt-card').style.display = 'none';
  document.getElementById('trt-empty').style.display = 'block';

  if (visible.length) {
    const bounds = L.latLngBounds(
      visible.map(item => [item.point.lat, item.point.lon])
    );
    map.fitBounds(bounds.pad(0.08));
  }
}

populateManagerFilter();
document.getElementById('direction-filter').addEventListener('change', applyFilter);
document.getElementById('manager-filter').addEventListener('change', applyFilter);
applyFilter();
</script>
</body>
</html>
