<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <title>Карта ТРТ МО</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
  <style>
    html, body { height:100%; margin:0; font-family:Arial,sans-serif; }
    .app { display:flex; height:100%; }
    .sidebar { width:360px; min-width:360px; background:#f7f8fa; border-right:1px solid #e2e5ea; padding:18px 16px; box-sizing:border-box; overflow-y:auto; }
    .sidebar h2 { margin:0 0 14px; font-size:20px; }
    .card { background:#fff; border-radius:12px; padding:14px; box-shadow:0 1px 3px rgba(0,0,0,.08); }
    .name { margin:0 0 10px; font-size:18px; }
    .size-badge { display:inline-flex; align-items:center; justify-content:center; min-width:44px; height:28px; padding:0 10px; border-radius:14px; color:#fff; font-weight:bold; font-size:14px; }
    .field { margin:10px 0; font-size:14px; line-height:1.4; }
    .label { color:#667085; font-size:12px; text-transform:uppercase; letter-spacing:.04em; margin-bottom:2px; }
    .hint { color:#667085; font-size:13px; line-height:1.45; }
    #map { flex:1; height:100%; }
    .size-marker { width:18px; height:18px; border-radius:50%; border:2px solid white; box-shadow:0 1px 3px rgba(0,0,0,.35); }
    @media (max-width:720px) {
      .app { flex-direction:column; }
      .sidebar { width:100%; min-width:0; height:38%; border-right:0; border-bottom:1px solid #e2e5ea; }
      #map { height:62%; }
    }
  </style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <h2>Карточка ТРТ</h2>
    <div class="card">
      <div id="trt-empty" class="hint">Нажмите на конкретную точку на карте, чтобы открыть карточку ТРТ.</div>
      <div id="trt-card" style="display:none;">
        <h3 id="trt-name" class="name"></h3>
        <div class="field"><div class="label">Размер</div><div id="trt-size"></div></div>
        <div class="field"><div class="label">Менеджер</div><div id="trt-manager"></div></div>
        <div class="field"><div class="label">Адрес</div><div id="trt-address"></div></div>
      </div>
    </div>
  </aside>
  <div id="map"></div>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script>
const points = [];
function colorForSize(size) {
  if (size < 50) return '#e74c3c';
  if (size <= 100) return '#f1c40f';
  return '#2ecc71';
}
function updateSidebar(p) {
  document.getElementById('trt-empty').style.display = 'none';
  document.getElementById('trt-card').style.display = 'block';
  document.getElementById('trt-name').textContent = p.client || 'ТРТ';
  document.getElementById('trt-size').innerHTML = '<span class="size-badge" style="background:' + colorForSize(p.size) + '">' + p.size + '</span>';
  document.getElementById('trt-manager').textContent = p.manager || '—';
  document.getElementById('trt-address').textContent = p.address || '—';
}
const map = L.map('map').setView([55.55, 37.55], 8);
L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {maxZoom:18, attribution:'© OpenStreetMap contributors'}).addTo(map);
map.attributionControl.setPrefix('');
const clusters = L.markerClusterGroup({
  zoomToBoundsOnClick:true,
  spiderfyOnMaxZoom:true,
  iconCreateFunction:function(cluster) {
    const markers = cluster.getAllChildMarkers();
    const avg = markers.reduce((sum,m)=>sum+(m.options.sizeValue||0),0)/markers.length;
    const color = colorForSize(avg);
    return L.divIcon({
      html:'<div style="background:'+color+';width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:3px solid white;box-shadow:0 1px 3px rgba(0,0,0,.35)"><span style="color:white;font-weight:bold">'+markers.length+'</span></div>',
      className:'', iconSize:[40,40]
    });
  }
});
points.forEach(function(p) {
  const icon = L.divIcon({className:'', html:'<div class="size-marker" style="background:'+colorForSize(p.size)+'"></div>', iconSize:[18,18], iconAnchor:[9,9]});
  const marker = L.marker([p.lat,p.lon], {icon:icon, sizeValue:p.size, title:p.client});
  marker.on('click', ()=>updateSidebar(p));
  marker.bindTooltip(p.client || 'ТРТ');
  clusters.addLayer(marker);
});
map.addLayer(clusters);
if (points.length) {
  const bounds = L.latLngBounds(points.map(p=>[p.lat,p.lon]));
  map.fitBounds(bounds.pad(0.08));
}
</script>
</body>
</html>
